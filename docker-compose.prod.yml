# Docker Compose Production
# Django Application for VPS Deployment

services:
  aplikasi_test:
    build:
      context: .
      dockerfile: Dockerfile
    image: aplikasi-test:latest
    container_name: dasar-python
    restart: unless-stopped
    command: gunicorn core.wsgi:application --config gunicorn.conf.py
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8007:8000"
    environment:
      # Django Settings
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=core.settings
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - ALLOWED_HOSTS=aplikasi-test.local,172.16.30.139,localhost
      
      # SSL Settings - set False jika belum setup SSL
      - SECURE_SSL_REDIRECT=False
      
      # Database Configuration (using existing MySQL)
      - DB_HOST=mysql-main
      - DB_NAME=dasar_python_db
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-5406@Pessel!23#}
      - DB_PORT=3306
      
      # Redis Configuration (using existing Redis)
      - REDIS_HOST=redis-main
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-5406@Pessel!23#}
      - REDIS_DB=3
      
      # Performance Settings
      - DJANGO_MAX_REQUEST_SIZE=134217728
      - GUNICORN_TIMEOUT=300
      - GUNICORN_WORKERS=4
      - GUNICORN_WORKER_CLASS=sync
      
      # Application Branding
      - APP_NAME=aplikasi-test
      - APP_LONG_NAME=Aplikasi Test
      - APP_INSTANSI=Instansi
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '1.0'
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  static_volume:
    name: dasar_python_static
  media_volume:
    name: dasar_python_media
  logs_volume:
    name: dasar_python_logs

networks:
  proxy-network:
    external: true
    name: proxy-network
